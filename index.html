<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Access</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    height: 100vh;
    background: #0f0f0f;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

/* ===== RGB Logo Top Left ===== */
.rgb-title {
    position: fixed;
    top: 25px;
    left: 30px;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 2px;
    z-index: 3;
    background: linear-gradient(90deg, red, orange, yellow, green, cyan, blue, violet, red);
    background-size: 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: rgbMove 6s linear infinite;
}

@keyframes rgbMove {
    0% { background-position: 0%; }
    100% { background-position: 400%; }
}

/* ===== Particles Background ===== */
#particles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: 0;
    top: 0;
    left: 0;
}

/* ===== Glow background ===== */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(88,101,242,0.35), transparent 70%);
    filter: blur(140px);
    top: -200px;
    right: -200px;
    z-index: 0;
}

/* ===== Card ===== */
.container {
    position: relative;
    z-index: 2;
    padding: 70px 80px;
    border-radius: 28px;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    text-align: center;
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.7);
    max-width: 650px;
    animation: fadeIn 1.2s ease-out;
}

/* ===== Logo ===== */
.logo {
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 25px;
    background: linear-gradient(135deg, #5865F2, #9b5cff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
}

/* ===== Text ===== */
.container h1 {
    font-size: 24px;
    font-weight: 500;
    margin-bottom: 20px;
}

.container p {
    font-weight: 300;
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    margin-bottom: 40px;
}

/* ===== Button ===== */
.discord-btn {
    display: inline-block;
    padding: 15px 40px;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    color: white;
    background: linear-gradient(135deg, #5865F2, #8f5cff);
    transition: 0.3s ease;
    box-shadow: 0 15px 35px rgba(88,101,242,0.5);
}

.discord-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(88,101,242,0.8);
}

/* ===== Animation ===== */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(40px);}
    to {opacity: 1; transform: translateY(0);}
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
    .container {
        padding: 40px;
        margin: 20px;
    }
}
</style>
</head>
<body>

<!-- RGB Title -->
<div class="rgb-title">GO DEFENSE ANTI CHEAT</div>

<canvas id="particles"></canvas>

<div class="container">
    <div class="logo">ANTI CHEAT</div>
    <h1>Premium Access</h1>
    <p>To purchase our products, please contact us directly through our Discord server.</p>
    <a href="https://discord.gg/CTCFtBWY" class="discord-btn">Join Our Discord</a>
</div>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedX = Math.random() * 0.3 - 0.15;
        this.speedY = Math.random() * 0.3 - 0.15;
    }
    update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
        if (this.y > canvas.height || this.y < 0) this.speedY *= -1;
    }
    draw() {
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    particlesArray = [];
    for (let i = 0; i < 120; i++) {
        particlesArray.push(new Particle());
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particlesArray.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(animate);
}

init();
animate();

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    init();
});
</script>

</body>
</html>
